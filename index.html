<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Rogue Rings — экшн-рогалик</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0f;
        overflow: hidden;
        height: 100%;
        font-family: system-ui, sans-serif;
        color: #e8e8f0;
      }
      /* fixed + dvh — реальная видимая область на мобильных (без обрезки под панелью браузера) */
      #game {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        touch-action: none;
      }
      /* подсказка повернуть телефон в портрете */
      #rotate {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: #0a0a0f;
        color: #e8e8f0;
        font-size: 20px;
        z-index: 10;
        padding: 24px;
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate">📱↻ Поверни телефон горизонтально</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
