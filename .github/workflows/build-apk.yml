name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install deps
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Build web
        run: npm run build
      - name: Capacitor sync
        run: npx cap sync android
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk rogue-rings.apk
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rogue-rings-apk
          path: rogue-rings.apk
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Rogue Rings — APK (последняя сборка)
          body: |
            Дебажный APK для Android. Скачай `rogue-rings.apk` на телефон и установи
            (разреши «Установку из неизвестных источников»). Полноэкранный, альбомная ориентация.
          files: rogue-rings.apk
          make_latest: 'true'
